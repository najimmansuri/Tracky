<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Tracky</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&family=Epilogue:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #f7f5f2;
  --canvas:    #edeae4;
  --card:      #ffffff;
  --border:    #ddd9d0;
  --border2:   #ccc8be;
  --ink:       #1c1a17;
  --ink2:      #4a4740;
  --ghost:     #8a877e;
  --ghost2:    #b8b5ac;

  --amber:     #d4781a;
  --amber-bg:  #fdf2e3;
  --amber-bd:  #f0c984;

  --violet:    #6047d4;
  --violet-bg: #f0ecfc;
  --violet-bd: #c4b8f4;

  --teal:      #0e8a6a;
  --teal-bg:   #e4f6f0;
  --teal-bd:   #8ed8c0;

  --blue:      #1a5fc4;
  --blue-bg:   #e6effe;
  --blue-bd:   #9dbef0;

  --red:       #c43030;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Epilogue', sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 180px;
  pointer-events: none;
  z-index: 0;
  opacity: .6;
}

.wrap {
  max-width: 480px;
  margin: 0 auto;
  padding: 0 18px 110px;
  position: relative;
  z-index: 1;
}

/* ── HEADER ── */
.hdr {
  padding: 32px 0 22px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 26px;
}

.hdr-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.hdr-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ghost);
  letter-spacing: .08em;
  text-transform: uppercase;
}

.live-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--teal-bg);
  border: 1px solid var(--teal-bd);
  color: var(--teal);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 4px;
  letter-spacing: .1em;
  text-transform: uppercase;
}

.live-dot {
  width: 5px; height: 5px;
  background: var(--teal);
  border-radius: 50%;
  animation: pulse 2s ease infinite;
}

@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:.3; transform:scale(.6); }
}

.hdr-title {
  font-family: 'Syne', sans-serif;
  font-size: 38px;
  font-weight: 800;
  letter-spacing: -.04em;
  line-height: .95;
  color: var(--ink);
}

.hdr-title span {
  color: var(--ghost2);
  font-weight: 400;
}

/* ── LOADING ── */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 80px 0;
  gap: 14px;
}

.spin {
  width: 26px; height: 26px;
  border: 2px solid var(--border2);
  border-top-color: var(--amber);
  border-radius: 50%;
  animation: rot .7s linear infinite;
}

@keyframes rot { to { transform: rotate(360deg); } }

.loading p {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ghost);
  letter-spacing: .1em;
  text-transform: uppercase;
}

/* ── SECTION LABEL ── */
.slabel {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: .14em;
  color: var(--ghost);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.slabel::after { content:''; flex:1; height:1px; background:var(--border); }

/* ── STATS ── */
.stats {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 8px;
  margin-bottom: 28px;
}

.stat {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 16px 14px;
  position: relative;
  overflow: hidden;
  transition: transform .15s, box-shadow .15s;
}

.stat:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,.07); }

.stat-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: 12px 12px 0 0;
}

.stat.a .stat-bar { background: var(--amber); }
.stat.v .stat-bar { background: var(--violet); }
.stat.t .stat-bar { background: var(--teal); }
.stat.b .stat-bar { background: var(--blue); }

.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 4px;
}

.stat-num {
  font-family: 'Syne', sans-serif;
  font-size: 52px;
  font-weight: 800;
  line-height: 1;
  letter-spacing: -.04em;
}

.stat.a .stat-num { color: var(--amber); }
.stat.v .stat-num { color: var(--violet); }
.stat.t .stat-num { color: var(--teal); }
.stat.b .stat-num { color: var(--blue); }

.stat-ico {
  margin-top: 8px;
  opacity: .25;
}
.stat-ico svg {
  width: 18px; height: 18px;
  stroke: currentColor; fill: none;
  stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
}
.stat.a .stat-ico { color: var(--amber); }
.stat.v .stat-ico { color: var(--violet); }
.stat.t .stat-ico { color: var(--teal); }
.stat.b .stat-ico { color: var(--blue); }

.stat-lbl {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--ghost);
}

/* ── LAST SYNCED ── */
.synced {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--ghost2);
  text-align: center;
  margin-bottom: 22px;
  letter-spacing: .06em;
  text-transform: uppercase;
}

/* ── PERSON HEAD ── */
.person-row {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 13px 15px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 8px;
}

.av {
  width: 36px; height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 800;
  flex-shrink: 0;
}

.pname {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: -.01em;
  flex: 1;
}

.pbadge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ghost);
  background: var(--canvas);
  border: 1px solid var(--border);
  padding: 3px 9px;
  border-radius: 4px;
}

/* ── VIDEO CARD ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 15px;
  margin-bottom: 7px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  cursor: pointer;
  animation: fadeup .3s ease both;
  transition: border-color .18s, box-shadow .18s, transform .15s;
  user-select: none;
}

.card:hover {
  border-color: var(--border2);
  box-shadow: 0 3px 14px rgba(0,0,0,.08);
  transform: translateY(-1px);
}

.card:active { transform: scale(.99); }

@keyframes fadeup {
  from { opacity:0; transform:translateY(7px); }
  to   { opacity:1; transform:translateY(0); }
}

.cbar {
  width: 3px;
  border-radius: 10px;
  align-self: stretch;
  flex-shrink: 0;
  min-height: 18px;
}

.cbar-wip    { background: var(--amber); }
.cbar-review { background: var(--violet); }
.cbar-done   { background: var(--teal); opacity:.45; }
.cbar-ytd    { background: var(--blue); }
.cbar-closed { background: var(--ghost2); }

.cbody { flex:1; min-width:0; }

.cname {
  font-size: 13px;
  font-weight: 500;
  line-height: 1.45;
  color: var(--ink);
  margin-bottom: 8px;
}

.card-dim .cname { color: var(--ghost); }

.cmeta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 5px;
}

.pill {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: .06em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 4px;
  border: 1px solid;
}

.pill-wip    { background:var(--amber-bg);  color:var(--amber);  border-color:var(--amber-bd); }
.pill-review { background:var(--violet-bg); color:var(--violet); border-color:var(--violet-bd); }
.pill-done   { background:var(--teal-bg);   color:var(--teal);   border-color:var(--teal-bd); }
.pill-ytd    { background:var(--blue-bg);   color:var(--blue);   border-color:var(--blue-bd); }
.pill-closed { background:var(--canvas);    color:var(--ghost);  border-color:var(--border2); }

.ttag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--ghost);
  background: var(--canvas);
  border: 1px solid var(--border);
  padding: 3px 7px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: .05em;
}

.dtag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--ghost);
  margin-left: auto;
  white-space: nowrap;
}

.dtag-late { color: var(--red); font-weight: 500; }
.dtag-soon { color: var(--amber); font-weight: 500; }

.card-arrow {
  flex-shrink: 0;
  color: var(--ghost2);
  align-self: center;
  margin-left: 4px;
}
.card-arrow svg { width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

.empty {
  text-align: center;
  padding: 38px 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ghost2);
  letter-spacing: .1em;
  text-transform: uppercase;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
}

.divider { height:1px; background:var(--border); margin:22px 0; }

/* ── MODAL OVERLAY ── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(28,26,23,.5);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .22s ease;
}

.overlay.show {
  opacity: 1;
  pointer-events: all;
}

/* ── DETAIL SHEET ── */
.sheet {
  width: 100%;
  max-width: 480px;
  background: var(--card);
  border-radius: 18px 18px 0 0;
  padding: 0 0 44px;
  transform: translateY(32px);
  transition: transform .28s cubic-bezier(.32,.72,0,1);
  max-height: 88vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.overlay.show .sheet { transform: translateY(0); }

.sheet-handle {
  width: 36px; height: 4px;
  background: var(--border2);
  border-radius: 2px;
  margin: 14px auto 20px;
}

.sheet-inner { padding: 0 20px; }

.sheet-status {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

.sheet-title {
  font-family: 'Syne', sans-serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -.02em;
  line-height: 1.25;
  color: var(--ink);
  margin-bottom: 20px;
}

.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 16px;
}

.info-cell {
  background: var(--canvas);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 11px 12px;
}

.info-cell-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8.5px;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--ghost);
  margin-bottom: 4px;
}

.info-cell-value {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink2);
  word-break: break-word;
}

.notes-box {
  background: var(--canvas);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 13px 14px;
  margin-bottom: 20px;
}

.notes-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8.5px;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--ghost);
  margin-bottom: 6px;
}

.notes-text {
  font-size: 13px;
  color: var(--ink2);
  line-height: 1.55;
}

.notes-empty {
  font-size: 12px;
  color: var(--ghost2);
  font-style: italic;
}

/* action buttons */
.sheet-actions {
  display: flex;
  gap: 10px;
}

.btn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 12px;
  border-radius: 10px;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: -.01em;
  border: none;
  cursor: pointer;
  transition: transform .15s, opacity .15s;
  text-decoration: none;
  -webkit-tap-highlight-color: transparent;
}

.btn:active { transform: scale(.97); }

.btn svg {
  width: 16px; height: 16px;
  stroke: currentColor; fill: none;
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  flex-shrink: 0;
}

.btn-watch {
  background: var(--ink);
  color: #fff;
}

.btn-watch:hover { opacity: .88; }

.btn-disabled {
  background: var(--canvas);
  color: var(--ghost2);
  border: 1px solid var(--border);
  cursor: not-allowed;
  opacity: .7;
}

.btn-disabled:active { transform: none; }

/* ── WARN ── */
.warn {
  background: var(--amber-bg);
  border: 1px solid var(--amber-bd);
  color: var(--amber);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 16px;
  border-radius: 10px;
  text-align: center;
  line-height: 1.7;
  letter-spacing: .04em;
}

/* ── TAB BAR ── */
.tabbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  display: flex;
  justify-content: center;
  z-index: 100;
}

.tabs {
  width: 100%;
  max-width: 480px;
  background: rgba(247,245,242,.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 10px 16px 28px;
  gap: 6px;
}

.tb {
  flex: 1;
  background: none;
  border: 1px solid transparent;
  color: var(--ghost);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  padding: 10px 4px;
  border-radius: 8px;
  cursor: pointer;
  transition: all .16s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  text-transform: uppercase;
  letter-spacing: .09em;
}

.tb svg {
  width: 17px; height: 17px;
  stroke: currentColor; fill: none;
  stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round;
}

.tb.on {
  background: var(--amber-bg);
  color: var(--amber);
  border-color: var(--amber-bd);
}

.sec { display: none; }
.sec.on { display: block; }
</style>
</head>
<body>

<div class="wrap">
  <div class="hdr">
    <div class="hdr-meta">
      <div class="hdr-date" id="todayDate"></div>
      <div class="live-badge"><div class="live-dot"></div>Live</div>
    </div>
    <div class="hdr-title">Tracky<br><span>Video Tracker</span></div>
  </div>

  <div class="loading" id="loadingEl">
    <div class="spin"></div>
    <p>Loading</p>
  </div>

  <div id="appContent" style="display:none">

    <div id="s-overview" class="sec on">
      <div class="slabel">At a glance</div>
      <div class="stats">
        <div class="stat a">
          <div class="stat-bar"></div>
          <div class="stat-row">
            <div class="stat-num" id="cnt-wip">0</div>
            <div class="stat-ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg></div>
          </div>
          <div class="stat-lbl">In Progress</div>
        </div>
        <div class="stat v">
          <div class="stat-bar"></div>
          <div class="stat-row">
            <div class="stat-num" id="cnt-review">0</div>
            <div class="stat-ico"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></div>
          </div>
          <div class="stat-lbl">In Review</div>
        </div>
        <div class="stat t">
          <div class="stat-bar"></div>
          <div class="stat-row">
            <div class="stat-num" id="cnt-done">0</div>
            <div class="stat-ico"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
          </div>
          <div class="stat-lbl">Done</div>
        </div>
        <div class="stat b">
          <div class="stat-bar"></div>
          <div class="stat-row">
            <div class="stat-num" id="cnt-ytd">0</div>
            <div class="stat-ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
          </div>
          <div class="stat-lbl">To Do</div>
        </div>
      </div>
      <div id="lastUpdated" class="synced"></div>
      <div class="slabel">Everyone</div>
      <div id="overview-body"></div>
    </div>

    <div id="s-wip" class="sec">
      <div class="slabel">In Progress</div>
      <div id="wip-body"></div>
    </div>

    <div id="s-review" class="sec">
      <div class="slabel">In Review</div>
      <div id="review-body"></div>
    </div>

    <div id="s-done" class="sec">
      <div class="slabel">Completed</div>
      <div id="done-body"></div>
    </div>

  </div>
</div>

<!-- Tab bar -->
<div class="tabbar">
  <nav class="tabs">
    <button class="tb on" onclick="show('overview',this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      Overview
    </button>
    <button class="tb" onclick="show('wip',this)">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
      WIP
    </button>
    <button class="tb" onclick="show('review',this)">
      <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      Review
    </button>
    <button class="tb" onclick="show('done',this)">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      Done
    </button>
  </nav>
</div>

<!-- Detail bottom sheet -->
<div class="overlay" id="overlay" onclick="closeSheet(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-inner" id="sheetInner"></div>
  </div>
</div>

<script>
const DATA_URL = "https://raw.githubusercontent.com/najimmansuri/Tracky/main/data.json";
let ALL_ROWS = [];

// ── Tab switching ──
function show(n, b) {
  document.querySelectorAll('.sec').forEach(s => s.classList.remove('on'));
  document.querySelectorAll('.tb').forEach(x => x.classList.remove('on'));
  document.getElementById('s-' + n).classList.add('on');
  b.classList.add('on');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Check if a string is a real clickable URL ──
function isValidUrl(str) {
  if (!str) return false;
  const s = str.trim();
  return s.startsWith('http://') || s.startsWith('https://') || s.startsWith('f.io/');
}

function normaliseUrl(str) {
  const s = str.trim();
  if (s.startsWith('f.io/')) return 'https://' + s;
  return s;
}

// ── Open detail sheet ──
function openSheet(idx) {
  const r = ALL_ROWS[idx];
  if (!r) return;

  const hasLink = isValidUrl(r.link);
  const linkUrl = hasLink ? normaliseUrl(r.link) : null;
  const dateDisplay = r.dateIso
    ? new Date(r.dateIso).toLocaleDateString("en-GB", { day:"numeric", month:"long", year:"numeric" })
    : '—';

  document.getElementById('sheetInner').innerHTML = `
    <div class="sheet-status">
      ${pillHtml(r.status)}
      ${r.type ? `<span class="ttag">${r.type}</span>` : ''}
    </div>
    <div class="sheet-title">${r.name || 'Untitled'}</div>
    <div class="info-grid">
      <div class="info-cell">
        <div class="info-cell-label">Owner</div>
        <div class="info-cell-value">${r.owner || '—'}</div>
      </div>
      <div class="info-cell">
        <div class="info-cell-label">Date</div>
        <div class="info-cell-value">${dateDisplay}</div>
      </div>
      <div class="info-cell">
        <div class="info-cell-label">Status</div>
        <div class="info-cell-value">${r.status || '—'}</div>
      </div>
      <div class="info-cell">
        <div class="info-cell-label">Type</div>
        <div class="info-cell-value">${r.type || '—'}</div>
      </div>
    </div>
    <div class="notes-box">
      <div class="notes-label">Notes</div>
      ${r.notes && r.notes.trim()
        ? `<div class="notes-text">${r.notes.trim().replace(/\n/g,'<br>')}</div>`
        : `<div class="notes-empty">No notes for this video</div>`}
    </div>
    <div class="sheet-actions">
      ${linkUrl
        ? `<a class="btn btn-watch" href="${linkUrl}" target="_blank" rel="noopener">
             <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
             Watch Video
           </a>`
        : `<button class="btn btn-disabled" disabled>
             <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
             No Link Yet
           </button>`}
    </div>
  `;

  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeSheet(e) {
  if (e && e.target !== document.getElementById('overlay')) return;
  _closeSheet();
}

function _closeSheet() {
  document.getElementById('overlay').classList.remove('show');
  document.body.style.overflow = '';
}

// Swipe down to dismiss
(function() {
  const sheet = document.getElementById('sheet');
  let startY = 0, dragging = false;
  sheet.addEventListener('touchstart', e => { startY = e.touches[0].clientY; dragging = true; }, { passive:true });
  sheet.addEventListener('touchmove', e => {
    if (!dragging) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 0) sheet.style.transform = `translateY(${dy}px)`;
  }, { passive:true });
  sheet.addEventListener('touchend', e => {
    dragging = false;
    const dy = e.changedTouches[0].clientY - startY;
    sheet.style.transform = '';
    if (dy > 70) _closeSheet();
  });
})();

// ── Helpers ──
function formatDate(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d)) return "";
  return d.toLocaleDateString("en-GB", { day:"numeric", month:"short" });
}

function daysFromNow(iso) {
  if (!iso) return null;
  const d = new Date(iso);
  if (isNaN(d)) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.round((d - now) / 86400000);
}

const AVC = [
  { bg:"#fdf2e3", fg:"#d4781a" },
  { bg:"#f0ecfc", fg:"#6047d4" },
  { bg:"#e4f6f0", fg:"#0e8a6a" },
  { bg:"#e6effe", fg:"#1a5fc4" },
];

function avc(name) {
  if (!name) return AVC[0];
  let h = 0; for (const c of name) h += c.charCodeAt(0);
  return AVC[h % AVC.length];
}

function pillHtml(s) {
  const m = {
    "WIP":       ["pill-wip",    "WIP"],
    "In Review": ["pill-review", "Review"],
    "Done":      ["pill-done",   "Done"],
    "YTD":       ["pill-ytd",    "YTD"],
    "Closed":    ["pill-closed", "Closed"],
  };
  const [cls, lbl] = m[s] || ["pill-ytd", s || "YTD"];
  return `<span class="pill ${cls}">${lbl}</span>`;
}

function cbarClass(s) {
  return { "WIP":"cbar-wip","In Review":"cbar-review","Done":"cbar-done","YTD":"cbar-ytd","Closed":"cbar-closed" }[s] || "cbar-ytd";
}

function dateHtml(iso, status) {
  if (!iso) return "";
  const lbl = formatDate(iso);
  if (!lbl) return "";
  if (status === "Done" || status === "Closed") return `<span class="dtag">${lbl}</span>`;
  const days = daysFromNow(iso);
  if (days === null) return `<span class="dtag">${lbl}</span>`;
  if (days < 0)  return `<span class="dtag dtag-late">${lbl} · ${Math.abs(days)}d late</span>`;
  if (days <= 3) return `<span class="dtag dtag-soon">${lbl} · ${days}d</span>`;
  return `<span class="dtag">${lbl}</span>`;
}

// ── Render ──
function renderCards(items) {
  if (!items.length) return `<div class="empty">Nothing here</div>`;
  return items.map((r, i) => {
    const idx = ALL_ROWS.indexOf(r);
    const dim = r.status === "Done" || r.status === "Closed";
    return `
<div class="card${dim ? ' card-dim' : ''}" style="animation-delay:${i*.04}s" onclick="openSheet(${idx})">
  <div class="cbar ${cbarClass(r.status)}"></div>
  <div class="cbody">
    <div class="cname">${r.name || 'Untitled'}</div>
    <div class="cmeta">
      ${pillHtml(r.status)}
      ${r.type ? `<span class="ttag">${r.type}</span>` : ''}
      ${dateHtml(r.dateIso, r.status)}
    </div>
  </div>
  <div class="card-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
</div>`;
  }).join('');
}

function renderByPerson(rows, filterStatus) {
  const people = [...new Set(rows.map(r => r.owner).filter(Boolean))].sort();
  let html = "";
  people.forEach((p, pi) => {
    const base = filterStatus
      ? rows.filter(r => r.status === filterStatus)
      : rows.filter(r => r.status !== "Closed");
    const items = base.filter(r => r.owner && r.owner.toLowerCase() === p.toLowerCase());
    if (!items.length) return;
    const col = avc(p);
    const active = items.filter(r => r.status !== "Closed").length;
    html += `
      ${pi > 0 ? '<div class="divider"></div>' : ''}
      <div class="person-row">
        <div class="av" style="background:${col.bg};color:${col.fg}">${p[0].toUpperCase()}</div>
        <div class="pname">${p}</div>
        <div class="pbadge">${active} active</div>
      </div>
      ${renderCards(items)}`;
  });
  return html || `<div class="empty">Nothing here</div>`;
}

// ── Init ──
document.getElementById('todayDate').textContent =
  new Date().toLocaleDateString("en-GB", { weekday:"long", day:"numeric", month:"long", year:"numeric" }).toUpperCase();

fetch(DATA_URL + "?t=" + Date.now())
  .then(r => { if (!r.ok) throw new Error("data.json not found"); return r.json(); })
  .then(data => {
    document.getElementById('loadingEl').style.display = 'none';
    document.getElementById('appContent').style.display = 'block';

    ALL_ROWS = (data.rows || []).filter(r => r.name || r.status || r.owner);
    const updatedAt = data.updatedAt || "";

    document.getElementById('cnt-wip').textContent    = ALL_ROWS.filter(r => r.status === "WIP").length;
    document.getElementById('cnt-review').textContent = ALL_ROWS.filter(r => r.status === "In Review").length;
    document.getElementById('cnt-done').textContent   = ALL_ROWS.filter(r => r.status === "Done").length;
    document.getElementById('cnt-ytd').textContent    = ALL_ROWS.filter(r => r.status === "YTD").length;

    if (updatedAt) {
      const d = new Date(updatedAt);
      document.getElementById('lastUpdated').textContent =
        "Last synced · " + d.toLocaleString("en-GB", { day:"numeric", month:"short", hour:"2-digit", minute:"2-digit" });
    }

    document.getElementById('overview-body').innerHTML = renderByPerson(ALL_ROWS, null);
    document.getElementById('wip-body').innerHTML      = renderByPerson(ALL_ROWS, "WIP");
    document.getElementById('review-body').innerHTML   = renderCards(ALL_ROWS.filter(r => r.status === "In Review"));
    document.getElementById('done-body').innerHTML     = renderByPerson(ALL_ROWS, "Done");
  })
  .catch(err => {
    document.getElementById('loadingEl').innerHTML =
      `<div class="warn">Could not load data.json<br>${err.message}</div>`;
  });
</script>
