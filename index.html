<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Video Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c0e;
  --surface: #111114;
  --surface2: #18181d;
  --border: rgba(255,255,255,.06);
  --border2: rgba(255,255,255,.1);
  --text: #f0f0f2;
  --muted: #5a5a6e;
  --muted2: #3a3a4a;
  --wip: #e8a320;
  --review: #7c6af7;
  --done: #2dd4a0;
  --ytd: #4c8ef5;
  --wip-bg: rgba(232,163,32,.08);
  --review-bg: rgba(124,106,247,.08);
  --done-bg: rgba(45,212,160,.08);
  --ytd-bg: rgba(76,142,245,.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Geist', sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Subtle grid texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

.wrap {
  max-width: 460px;
  margin: 0 auto;
  padding: 0 16px 100px;
  position: relative;
  z-index: 1;
}

/* ── HEADER ── */
.hdr {
  padding: 32px 0 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
}

.hdr-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 14px;
}

.hdr-title {
  font-family: 'Instrument Serif', serif;
  font-size: 30px;
  font-weight: 400;
  letter-spacing: -.02em;
  line-height: 1;
  color: var(--text);
}

.hdr-title span {
  font-style: italic;
  color: var(--muted);
}

.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--done-bg);
  border: 1px solid rgba(45,212,160,.2);
  color: var(--done);
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  padding: 5px 10px;
  border-radius: 4px;
  letter-spacing: .04em;
  text-transform: uppercase;
  margin-top: 4px;
}

.live-dot {
  width: 5px;
  height: 5px;
  background: var(--done);
  border-radius: 50%;
  animation: blink 2s ease infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: .3; }
}

.hdr-meta {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: .06em;
  text-transform: uppercase;
}

/* ── LOADING ── */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 20px;
  gap: 14px;
}

.loader {
  width: 24px;
  height: 24px;
  border: 1.5px solid var(--border2);
  border-top-color: var(--wip);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading p {
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: .06em;
  text-transform: uppercase;
}

/* ── STATS ── */
.stats-label {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: .14em;
  color: var(--muted);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.stats-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 28px;
}

.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 10px 12px;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: border-color .2s;
}

.stat::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
}

.stat.wip::before { background: var(--wip); }
.stat.review::before { background: var(--review); }
.stat.done::before { background: var(--done); }
.stat.ytd::before { background: var(--ytd); }

.stat-n {
  font-family: 'Instrument Serif', serif;
  font-size: 28px;
  font-weight: 400;
  line-height: 1;
  margin-bottom: 5px;
}

.stat.wip .stat-n { color: var(--wip); }
.stat.review .stat-n { color: var(--review); }
.stat.done .stat-n { color: var(--done); }
.stat.ytd .stat-n { color: var(--ytd); }

.stat-l {
  font-family: 'Geist Mono', monospace;
  font-size: 8px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--muted);
}

/* ── SECTION LABEL ── */
.section-label {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: .14em;
  color: var(--muted);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── PERSON ── */
.person-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  margin-top: 4px;
}

.avatar {
  width: 32px;
  height: 32px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Instrument Serif', serif;
  font-size: 15px;
  color: #fff;
  flex-shrink: 0;
}

.person-name {
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -.01em;
  flex: 1;
}

.person-count {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 4px;
  letter-spacing: .04em;
}

/* ── CARDS ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 6px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  animation: fadeUp .3s ease both;
  transition: border-color .2s;
}

.card:hover { border-color: var(--border2); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.card-bar {
  width: 2px;
  border-radius: 2px;
  align-self: stretch;
  flex-shrink: 0;
  min-height: 16px;
}

.bar-wip { background: var(--wip); }
.bar-review { background: var(--review); }
.bar-done { background: var(--done); opacity: .5; }
.bar-ytd { background: var(--ytd); }
.bar-closed { background: var(--muted2); }

.card-body { flex: 1; min-width: 0; }

.card-name {
  font-size: 12.5px;
  font-weight: 400;
  line-height: 1.4;
  margin-bottom: 7px;
  color: var(--text);
}

.card-done .card-name { color: var(--muted); }

.card-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

/* Status pill */
.pill {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: .06em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 3px;
}

.pill-wip { background: var(--wip-bg); color: var(--wip); border: 1px solid rgba(232,163,32,.2); }
.pill-review { background: var(--review-bg); color: var(--review); border: 1px solid rgba(124,106,247,.2); }
.pill-done { background: var(--done-bg); color: var(--done); border: 1px solid rgba(45,212,160,.15); }
.pill-ytd { background: var(--ytd-bg); color: var(--ytd); border: 1px solid rgba(76,142,245,.2); }
.pill-closed { background: rgba(255,255,255,.03); color: var(--muted); border: 1px solid var(--border); }

/* Type tag */
.type-tag {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: .04em;
  text-transform: uppercase;
}

/* Date */
.date-tag {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  margin-left: auto;
}

.date-overdue { color: #e05555; font-weight: 500; }
.date-soon { color: var(--wip); font-weight: 500; }

/* Review note */
.review-note {
  font-size: 10.5px;
  color: var(--muted);
  margin-top: 5px;
  font-style: italic;
  letter-spacing: .01em;
}

.empty {
  text-align: center;
  padding: 32px;
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: var(--muted2);
  letter-spacing: .06em;
  text-transform: uppercase;
}

.divider {
  height: 1px;
  background: var(--border);
  margin: 20px 0;
}

.last-updated {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  color: var(--muted2);
  text-align: center;
  margin-bottom: 20px;
  letter-spacing: .06em;
  text-transform: uppercase;
}

.warn {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  color: var(--wip);
  background: var(--wip-bg);
  border: 1px solid rgba(232,163,32,.2);
  border-radius: 8px;
  padding: 14px 16px;
  text-align: center;
  line-height: 1.7;
  letter-spacing: .04em;
}

/* ── TABS ── */
.tab-wrap {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  justify-content: center;
  z-index: 100;
}

.tabs {
  width: 100%;
  max-width: 460px;
  background: rgba(12,12,14,.95);
  backdrop-filter: blur(24px);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 10px 12px 24px;
  gap: 4px;
}

.tb {
  flex: 1;
  background: none;
  border: 1px solid transparent;
  color: var(--muted);
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  padding: 9px 4px;
  border-radius: 6px;
  cursor: pointer;
  transition: all .18s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  text-transform: uppercase;
  letter-spacing: .08em;
}

.tb svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.tb.on {
  background: rgba(232,163,32,.08);
  color: var(--wip);
  border-color: rgba(232,163,32,.15);
}

.sec { display: none; }
.sec.on { display: block; }
</style>
</head>
<body>
<div class="wrap">

  <div class="hdr">
    <div class="hdr-top">
      <div>
        <div class="hdr-title">Video <span>Tracker</span></div>
      </div>
      <div class="live-badge">
        <div class="live-dot"></div>
        Live
      </div>
    </div>
    <div class="hdr-meta" id="todayDate"></div>
  </div>

  <div class="loading" id="loadingEl">
    <div class="loader"></div>
    <p>Loading</p>
  </div>

  <div id="appContent" style="display:none">

    <div id="s-overview" class="sec on">
      <div class="stats-label">Overview</div>
      <div class="stats-grid">
        <div class="stat wip">
          <div class="stat-n" id="cnt-wip">0</div>
          <div class="stat-l">WIP</div>
        </div>
        <div class="stat review">
          <div class="stat-n" id="cnt-review">0</div>
          <div class="stat-l">Review</div>
        </div>
        <div class="stat done">
          <div class="stat-n" id="cnt-done">0</div>
          <div class="stat-l">Done</div>
        </div>
        <div class="stat ytd">
          <div class="stat-n" id="cnt-ytd">0</div>
          <div class="stat-l">YTD</div>
        </div>
      </div>
      <div id="lastUpdated" class="last-updated"></div>
      <div class="section-label">All members</div>
      <div id="overview-body"></div>
    </div>

    <div id="s-wip" class="sec">
      <div class="section-label">In progress</div>
      <div id="wip-body"></div>
    </div>

    <div id="s-review" class="sec">
      <div class="section-label">In review</div>
      <div id="review-body"></div>
    </div>

    <div id="s-done" class="sec">
      <div class="section-label">Completed</div>
      <div id="done-body"></div>
    </div>

  </div>
</div>

<!-- Fixed Tab Bar -->
<div class="tab-wrap">
  <nav class="tabs">
    <button class="tb on" onclick="show('overview',this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Overview
    </button>
    <button class="tb" onclick="show('wip',this)">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
      WIP
    </button>
    <button class="tb" onclick="show('review',this)">
      <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      Review
    </button>
    <button class="tb" onclick="show('done',this)">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      Done
    </button>
  </nav>
</div>

<script>
const DATA_URL = "https://raw.githubusercontent.com/najimmansuri/Tracky/main/data.json";

function show(n, b) {
  document.querySelectorAll('.sec').forEach(s => s.classList.remove('on'));
  document.querySelectorAll('.tb').forEach(x => x.classList.remove('on'));
  document.getElementById('s-' + n).classList.add('on');
  b.classList.add('on');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function formatDate(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d)) return "";
  return d.toLocaleDateString("en-GB", { day: "numeric", month: "short" });
}

function daysFromNow(iso) {
  if (!iso) return null;
  const d = new Date(iso);
  if (isNaN(d)) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.round((d - now) / 86400000);
}

const AVATARS = [
  ["#1a1a2e","#e8a320"],
  ["#1a1a2e","#7c6af7"],
  ["#1a1a2e","#2dd4a0"],
  ["#1a1a2e","#4c8ef5"],
];
function avatarStyle(name) {
  if (!name) return AVATARS[0];
  let h = 0; for (const c of name) h += c.charCodeAt(0);
  return AVATARS[h % AVATARS.length];
}

function pillHtml(s) {
  const m = {
    "WIP":       ["pill-wip",    "WIP"],
    "In Review": ["pill-review", "Review"],
    "Done":      ["pill-done",   "Done"],
    "YTD":       ["pill-ytd",    "YTD"],
    "Closed":    ["pill-closed", "Closed"],
  };
  const [cls, lbl] = m[s] || ["pill-ytd", s || "YTD"];
  return `<span class="pill ${cls}">${lbl}</span>`;
}

function dateHtml(iso, status) {
  if (!iso) return "";
  const lbl = formatDate(iso);
  if (!lbl) return "";
  if (status === "Done" || status === "Closed") return `<span class="date-tag">${lbl}</span>`;
  const days = daysFromNow(iso);
  if (days === null) return `<span class="date-tag">${lbl}</span>`;
  if (days < 0) return `<span class="date-tag date-overdue">${lbl} &middot; ${Math.abs(days)}d late</span>`;
  if (days <= 3) return `<span class="date-tag date-soon">${lbl} &middot; ${days}d</span>`;
  return `<span class="date-tag">${lbl}</span>`;
}

function barClass(s) {
  return { "WIP":"bar-wip","In Review":"bar-review","Done":"bar-done","YTD":"bar-ytd","Closed":"bar-closed" }[s] || "bar-ytd";
}

function renderCards(items) {
  if (!items.length) return `<div class="empty">Nothing here</div>`;
  return items.map((r, i) => {
    const isDone = r.status === "Done" || r.status === "Closed";
    return `
<div class="card${isDone ? ' card-done' : ''}" style="animation-delay:${i * .04}s">
  <div class="card-bar ${barClass(r.status)}"></div>
  <div class="card-body">
    <div class="card-name">${r.name || 'Untitled'}</div>
    <div class="card-meta">
      ${pillHtml(r.status)}
      ${r.type ? `<span class="type-tag">${r.type}</span>` : ""}
      ${dateHtml(r.dateIso, r.status)}
    </div>
    ${r.status === "In Review" ? `<div class="review-note">Awaiting peer review</div>` : ""}
  </div>
</div>`;
  }).join("");
}

function renderByPerson(rows, filterStatus) {
  const people = [...new Set(rows.map(r => r.owner).filter(Boolean))].sort();
  let html = "";
  people.forEach((p, pi) => {
    const base = filterStatus
      ? rows.filter(r => r.status === filterStatus)
      : rows.filter(r => r.status !== "Closed");
    const items = base.filter(r => r.owner && r.owner.toLowerCase() === p.toLowerCase());
    if (!items.length) return;
    const [bg, fg] = avatarStyle(p);
    html += `
      ${pi > 0 ? '<div class="divider"></div>' : ""}
      <div class="person-head">
        <div class="avatar" style="background:${bg};color:${fg}">${p[0].toUpperCase()}</div>
        <div class="person-name">${p}</div>
        <div class="person-count">${items.length}</div>
      </div>
      ${renderCards(items)}`;
  });
  return html || `<div class="empty">Nothing here</div>`;
}

// Set date
document.getElementById('todayDate').textContent =
  new Date().toLocaleDateString("en-GB", { weekday:"long", day:"numeric", month:"long", year:"numeric" }).toUpperCase();

// Fetch data
fetch(DATA_URL + "?t=" + Date.now())
  .then(r => { if (!r.ok) throw new Error("data.json not found"); return r.json(); })
  .then(data => {
    document.getElementById('loadingEl').style.display = 'none';
    document.getElementById('appContent').style.display = 'block';

    const rows = (data.rows || []).filter(r => r.name || r.status || r.owner);
    const updatedAt = data.updatedAt || "";

    document.getElementById('cnt-wip').textContent    = rows.filter(r => r.status === "WIP").length;
    document.getElementById('cnt-review').textContent = rows.filter(r => r.status === "In Review").length;
    document.getElementById('cnt-done').textContent   = rows.filter(r => r.status === "Done").length;
    document.getElementById('cnt-ytd').textContent    = rows.filter(r => r.status === "YTD").length;

    if (updatedAt) {
      const d = new Date(updatedAt);
      document.getElementById('lastUpdated').textContent =
        "Last synced " + d.toLocaleString("en-GB", { day:"numeric", month:"short", hour:"2-digit", minute:"2-digit" });
    }

    document.getElementById('overview-body').innerHTML  = renderByPerson(rows, null);
    document.getElementById('wip-body').innerHTML       = renderByPerson(rows, "WIP");
    document.getElementById('review-body').innerHTML    = renderCards(rows.filter(r => r.status === "In Review"));
    document.getElementById('done-body').innerHTML      = renderByPerson(rows, "Done");
  })
  .catch(err => {
    document.getElementById('loadingEl').innerHTML = `
      <div class="warn">Could not load data.json<br>${err.message}</div>`;
  });
</script>
</body>
</html>
